<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

  button { background:#e8ff47; color:#000; border:none; padding:8px 16px; border-radius:6px; cursor:pointer; font-weight:700; margin:4px; font-size:12px; }

</div>

<script>

let L = document.getElementById('log');
function log(msg, type='wait') {
  const d = document.createElement('div');
  d.className = type;
  d.textContent = new Date().toISOString().slice(11,23) + ' — ' + msg;
  L.appendChild(d);
  console.log('[' + type + ']', msg);
  window.scrollTo(0,99999);
}

function clearStorage() {
  localStorage.clear(); sessionStorage.clear();
  log('Storage cleared — reloading', 'info');
  setTimeout(() => location.reload(), 400);
}

// ── Create client ─────────────────────────────────────────────────────────────
log('Creating Supabase client...', 'wait');
const sb = window.supabase.createClient(SB_URL, SB_KEY);
log('Client created', 'ok');

// ── Simulate the EXACT enterApp logic from gym-trainer.html ──────────────────
async function testFullEnterApp() {
  log('--- Simulating full enterApp() ---', 'info');

  // Step A: _hasUserRecord
  log('A: calling _hasUserRecord()...', 'wait');
  try {
    const { data: hrData, error: hrErr } = await sb.from('user_data')
      .select('user_id').eq('user_id', currentUserId).maybeSingle();

    log('C: building state...', 'wait');

    log('D: running DEFAULT_EXERCISES migration loop...', 'wait');
    const deletedSet = new Set(state.deletedDefaults);

    let added = 0;

  } catch(e) {
    log('B/C/D/E ERROR: ' + e.message + ' | stack: ' + (e.stack||'').split('\n')[1], 'err');
  }
}

// ── Auth state ────────────────────────────────────────────────────────────────
let currentUserId = null;
log('Waiting for onAuthStateChange...', 'wait');

const timer = setTimeout(() => log('TIMEOUT: onAuthStateChange never fired!', 'err'), 10000);

sb.auth.onAuthStateChange(async (event, session) => {
  clearTimeout(timer);
  log('onAuthStateChange: event=' + event + ' session=' + (session ? 'YES uid='+session.user.id : 'NULL'),
      session ? 'ok' : 'info');

  if (!session) {
    log('No session — you need to log in on the main app first, then come back here', 'err');
    return;
  }

  currentUserId = session.user.id;
  log('User ID: ' + currentUserId, 'info');

  // Fetch user_data
  log('Fetching user_data...', 'wait');
  try {
    const { data, error } = await sb.from('user_data')
      .select('exercises, enabled, sessions, next_id, username, created_at, deleted_defaults')
      .eq('user_id', currentUserId)
      .single();

    if (error) {
      log('user_data ERROR: ' + error.message + ' | code: ' + error.code + ' | hint: ' + error.hint, 'err');
      return;
    }

    log('user_data OK — exercises:' + (data.exercises?.length||0) + ' sessions:' + (data.sessions?.length||0), 'ok');
    log('All connectivity checks PASSED', 'ok');
    log('Click "Simulate enterApp()" to test the full app startup logic', 'info');

  } catch(e) {
    log('user_data EXCEPTION: ' + e.message, 'err');
  }
});
</script>
